---
- name: Grab LSB Release from shell
  shell: lsb_release -cs
  register: lsb_release

- name: Update /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "10.0.10.33 puppet-master-01.hq.infrahero.co.uk puppet"
    state: present

- name: Download latest .deb package
  get_url:
    url: "https://apt.puppet.com/puppet7-release-{{ lsb_release.stdout }}.deb"
    dest: /tmp/puppet-agent.deb
  when: lsb_release.stdout == 'noble' or lsb_release.stdout == 'focal'

- name: Install puppet7-release .deb package
  apt:
    deb: /tmp/puppet-agent.deb
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: lsb_release.stdout == 'noble' or lsb_release.stdout == 'focal'

- name: Install Puppet Agent
  apt:
    name: puppet-agent
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Update puppet.conf file
  blockinfile:
    path: "{{ puppet_config_path }}"
    block: |
      [main]
      certname = "{{ inventory_hostname }}"
      server = puppet-master-01.hq.infrahero.co.uk

      [agent]
      runinterval = 5m
    state: present

- name: Make a certificate request
  command: sudo {{ puppet_agent_path }} agent -t --server puppet-master-01.hq.infrahero.co.uk
  register: puppet_agent_test
  ignore_errors: true

- name: Approve the certificate request
  command: "puppetserver ca sign --all"
  when: puppet_agent_test.changed
  delegate_to: puppet-master-01.hq.infrahero.co.uk
