---
- name: Check AWX public key file exists
  ansible.builtin.stat:
    path: "{{ role_path }}/files/awx-key.pub"
  register: awx_pubkey_file
  delegate_to: localhost
  become: false

- name: Check personal public key file exists
  ansible.builtin.stat:
    path: "{{ role_path }}/files/id_ed25519.pub"
  register: personal_pubkey_file
  delegate_to: localhost
  become: false

- name: Stop if required public keys are missing
  ansible.builtin.assert:
    that:
      - awx_pubkey_file.stat.exists
      - personal_pubkey_file.stat.exists
    fail_msg: "SSH hardening aborted because one or more public key files are missing."

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\s+'
    line: 'PasswordAuthentication no'
    validate: 'sshd -t -f %s'
  notify: restart ssh

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin\s+'
    line: 'PermitRootLogin no'
    validate: 'sshd -t -f %s'
  notify: restart ssh