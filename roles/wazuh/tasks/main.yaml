---
- name: Download Wazuh agent install package
  ansible.builtin.get_url:
    url: "https://packages.wazuh.com/4.x/apt/pool/main/w/wazuh-agent/wazuh-agent_4.14.4-1_amd64.deb"
    dest: "/tmp/wazuh-agent_4.14.4-1_amd64.deb"
    mode: '0755'

- name: Install Wazuh agent package
  ansible.builtin.apt:
    deb: "/tmp/wazuh-agent_4.14.4-1_amd64.deb"
    state: present
    update_cache: yes

- name: Reload daemon and start Wazuh agent
  ansible.builtin.systemd:
    name: wazuh-agent
    state: restarted
    enabled: true

- name: Enable Wazuh agent to start on boot
  ansible.builtin.systemd:
    name: wazuh-agent
    enabled: true