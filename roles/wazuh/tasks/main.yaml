---
- name: Download Wazuh agent install package
  ansible.builtin.get_url:
    url: "https://packages.wazuh.com/4.x/apt/pool/main/w/wazuh-agent/wazuh-agent_4.14.4-1_amd64.deb"
    dest: "/tmp/wazuh-agent_4.14.4-1_amd64.deb"
    mode: '0755'

- name: Install Wazuh agent package
  ansible.builtin.apt:
    deb: "/tmp/wazuh-agent_4.14.4-1_amd64.deb"
    state: present
    update_cache: yes

- name: Replace MANAGER_IP with Wazuh manager IP address
  ansible.builtin.lineinfile:
  path: /var/ossec/etc/ossec.conf
  regexp: '<address>MANAGER_IP</address>'
  line: '<address>{{ wazuh_manager_ip }}</address>'
  notify: Start Wazuh agent