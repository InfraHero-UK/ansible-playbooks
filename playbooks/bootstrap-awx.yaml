---
- name: Bootstrap AWX access
  hosts: all
  become: yes
  vars:
    ansible_user: root
    awx_user: ansible

    awx_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIITG82Z258M+SNt2ZWxiRF9HB8pvo75oxbxY1dXgi6IO james@Jamess-MacBook.local"
    personal_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAp3UcPGRY73Hp5KaeAB8jzEjA2k95kER8+fa+oS+N0b james@infrahero"

  tasks:

    - name: Create automation user
      ansible.builtin.user:
        name: "{{ awx_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ awx_user }}/.ssh"
        state: directory
        owner: "{{ awx_user }}"
        group: "{{ awx_user }}"
        mode: '0700'

    - name: Add SSH public key
      ansible.builtin.authorized_key:
        user: "{{ awx_user }}"
        key: "{{ awx_pubkey }}"

    - name: Add personal SSH key to ansible user
      ansible.builtin.authorized_key:
        user: "{{ awx_user }}"
        key: "{{ personal_pubkey }}"

    - name: Add personal SSH key to root user
      ansible.builtin.authorized_key:
        user: root
        key: "{{ personal_pubkey }}"

    - name: Add personal SSH key to root user
      ansible.builtin.authorized_key:
        user: root
        key: "{{ personal_pubkey }}"

    - name: Allow passwordless sudo
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ awx_user }}"
        content: "{{ awx_user }} ALL=(ALL) NOPASSWD:ALL"
        mode: '0440'

  handlers:
    - name: restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted