---
- name: Bootstrap AWX and personal access
  hosts: all
  become: yes
  vars:
    ansible_user: root

    awx_user: ansible
    personal_user: james

    awx_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIITG82Z258M+SNt2ZWxiRF9HB8pvo75oxbxY1dXgi6IO james@Jamess-MacBook.local"
    personal_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAp3UcPGRY73Hp5KaeAB8jzEjA2k95kER8+fa+oS+N0b james@infrahero"

  tasks:
    - name: Create automation user
      ansible.builtin.user:
        name: "{{ awx_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Create personal admin user
      ansible.builtin.user:
        name: "{{ personal_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Ensure .ssh directory exists for automation user
      ansible.builtin.file:
        path: "/home/{{ awx_user }}/.ssh"
        state: directory
        owner: "{{ awx_user }}"
        group: "{{ awx_user }}"
        mode: "0700"

    - name: Ensure .ssh directory exists for personal user
      ansible.builtin.file:
        path: "/home/{{ personal_user }}/.ssh"
        state: directory
        owner: "{{ personal_user }}"
        group: "{{ personal_user }}"
        mode: "0700"

    - name: Add AWX public key to automation user
      ansible.builtin.authorized_key:
        user: "{{ awx_user }}"
        key: "{{ awx_pubkey }}"

    - name: Add personal SSH key to personal user
      ansible.builtin.authorized_key:
        user: "{{ personal_user }}"
        key: "{{ personal_pubkey }}"

    - name: Allow passwordless sudo for automation user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ awx_user }}"
        content: "{{ awx_user }} ALL=(ALL) NOPASSWD:ALL"
        mode: "0440"
        validate: "/usr/sbin/visudo -cf %s"

    - name: Allow passwordless sudo for personal user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ personal_user }}"
        content: "{{ personal_user }} ALL=(ALL) NOPASSWD:ALL"
        mode: "0440"
        validate: "/usr/sbin/visudo -cf %s"