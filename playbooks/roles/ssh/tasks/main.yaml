---
- name: Create automation user
  ansible.builtin.user:
    name: "{{ awx_user }}"
    shell: /bin/bash
    create_home: true

- name: Create personal admin user
  ansible.builtin.user:
    name: "{{ personal_user }}"
    shell: /bin/bash
    create_home: true

- name: Install AWX public key for automation user
  ansible.posix.authorized_key:
    user: "{{ awx_user }}"
    key: "{{ lookup('file', 'awx-key.pub') }}"
    manage_dir: true

- name: Install personal public key for personal user
  ansible.posix.authorized_key:
    user: "{{ personal_user }}"
    key: "{{ lookup('file', 'id_ed25519.pub') }}"
    manage_dir: true

- name: Allow passwordless sudo for automation user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ awx_user }}"
    content: "{{ awx_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"

- name: Allow passwordless sudo for personal user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ personal_user }}"
    content: "{{ personal_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"