---
- name: Sync VM IP addresses to NetBox
  hosts: Linux Servers
  gather_facts: true

  vars:
    netbox_url: "https://netbox.infrahero.co.uk"
    netbox_token: "{{ netbox_api_token }}"

  tasks:
    - name: Get primary IP (non-loopback, non-link-local)
      set_fact:
        primary_ip: "{{ ansible_all_ipv4_addresses | reject('match', '^127\\.') | reject('match', '^169\\.254\\.') | list | first }}"

    - name: Get prefix length for primary IP
      set_fact:
        primary_ip_prefix: "{{ ansible_all_ipv4_addresses | reject('match', '^127\\.') | reject('match', '^169\\.254\\.') | list | first }}/{{ ansible_interfaces | map('extract', ansible_facts) | selectattr('ipv4', 'defined') | selectattr('ipv4.address', 'equalto', primary_ip) | map(attribute='ipv4.prefix') | first | default('24') }}"

    - name: Get NetBox VM ID by hostname
      uri:
        url: "{{ netbox_url }}/api/virtualization/virtual-machines/?name={{ inventory_hostname }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        validate_certs: false
      register: netbox_vm

    - name: Fail if VM not found in NetBox
      fail:
        msg: "VM {{ inventory_hostname }} not found in NetBox"
      when: netbox_vm.json.count == 0

    - name: Set NetBox VM ID
      set_fact:
        vm_id: "{{ netbox_vm.json.results[0].id }}"

    - name: Check if IP already exists in NetBox
      uri:
        url: "{{ netbox_url }}/api/ipam/ip-addresses/?address={{ primary_ip_prefix }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        validate_certs: false
      register: existing_ip

    - name: Create IP address in NetBox if it doesn't exist
      uri:
        url: "{{ netbox_url }}/api/ipam/ip-addresses/"
        method: POST
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          address: "{{ primary_ip_prefix }}"
          status: "active"
          assigned_object_type: "virtualization.virtualmachine"
          assigned_object_id: "{{ vm_id }}"
        validate_certs: false
        status_code: 201
      register: created_ip
      when: existing_ip.json.count == 0

    - name: Set IP ID from existing or newly created
      set_fact:
        ip_id: "{{ existing_ip.json.results[0].id if existing_ip.json.count > 0 else created_ip.json.id }}"

    - name: Set primary IP on VM in NetBox
      uri:
        url: "{{ netbox_url }}/api/virtualization/virtual-machines/{{ vm_id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          primary_ip4: "{{ ip_id }}"
        validate_certs: false
        status_code: 200